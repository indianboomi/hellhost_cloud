<!DOCTYPE html>
<html>
<head>
  <title>Login Page</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f5f5f5;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    #googleBtn {
      background: #db4437;
      color: white;
    }

    #githubBtn {
      background: #333;
      color: white;
    }

    #logoutBtn {
      background: #555;
      color: white;
    }
  </style>
</head>
<body>

  <h2>Login / Register</h2>

  <button id="googleBtn">Login with Google</button>
  <button id="githubBtn">Login with GitHub</button>
  <br><br>
  <button id="logoutBtn">Logout</button>

  <h3 id="user"></h3>

  <!-- Firebase + Script -->
  <script type="module" src="script.js"></script>

</body>
</html>
